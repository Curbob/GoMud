# Fish Definitions
# Types: common, buff, junk, treasure
# HP/buffs are now handled by item definitions

fish:
  # === COMMON FISH ===
  pool_minnow:
    name: "Pool Minnow"
    description: "A tiny fish. How did it even get on the hook?"
    value: 1
    type: common

  mudfish:
    name: "Mudfish"
    description: "A common bottom-feeder. Not tasty, but edible."
    value: 2
    type: common

  frost_trout:
    name: "Frost Trout"
    description: "A cold-water fish prized for its flavor."
    value: 5
    type: common

  silver_carp:
    name: "Silver Carp"
    description: "Shimmering scales make this fish easy to spot."
    value: 8
    type: common

  # === BUFF FISH ===
  glowfin:
    name: "Glowfin"
    description: "A luminescent fish. Eating it grants enhanced vision."
    value: 15
    type: buff

  swiftscale:
    name: "Swiftscale"
    description: "An incredibly fast fish. Its energy is contagious."
    value: 20
    type: buff

  ironbelly:
    name: "Ironbelly"
    description: "A heavily armored fish. Tough to chew, tougher to digest."
    value: 25
    type: buff

  healfin:
    name: "Healfin"
    description: "A rare fish with regenerative properties."
    value: 30
    type: buff

  # === JUNK ===
  old_boot:
    name: "Old Boot"
    description: "Someone lost this ages ago. Smells like it."
    value: 1
    type: junk

  seaweed:
    name: "Seaweed"
    description: "Slimy and green. Maybe useful for something?"
    value: 1
    type: junk

  rusty_hook:
    name: "Rusty Hook"
    description: "An old fishing hook. Ironic."
    value: 2
    type: junk

  waterlogged_book:
    name: "Waterlogged Book"
    description: "The pages are ruined, but the cover looks interesting."
    value: 3
    type: junk
