name: run-tests

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23.x"
          cache: "go-mod"

      - name: Run code generation
        run: go generate ./...

      - name: Run tests
        run: make test
