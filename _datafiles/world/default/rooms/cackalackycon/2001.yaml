  message: A glitching purple portal spits out a script kiddie!
  respawnrate: 5 real minutes
idlemessages:
- A hacker mutters "one more packet..."
- Someone trips over a power cable. Nothing explodes. This time.
- The hotel staff look confused but impressed.
- A heated debate about Linux distros erupts.
- Is that a lime on the front desk? It is.
- The lobby WiFi drops. Groans echo.
nouns:
  couches: Hotel couches sag under the weight of hackers and their gear. Stickers cover every surface. One cushion has a suspicious burn mark.
  outlets: Power strips daisy-chained to power strips. This is definitely a fire hazard. Nobody cares.
  desk: The hotel front desk has a lime sitting on it. The staff have stopped questioning things.
