idlemessages:
- A small explosion. Someone waves away smoke.
- Solder fumes fill the air.
- A badge plays a distorted chiptune.
- Someone curses at a bricked badge.
- Purple sparks arc between two badges on a table.
nouns:
  oscilloscope: A vintage Tektronix oscilloscope displays waveforms from a badge's communication bus. Someone has labeled the probes with tape.
  soldering: Soldering stations line the tables, each with a brass sponge and helping hands. The tips glow orange.
  badges: Badges in various states of disassembly cover every surface. Some blink. Some smoke. One is definitely possessed.
