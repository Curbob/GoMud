idlemessages:
- Pipes groan overhead.
- The fluorescent lights flicker.
- You hear humming from somewhere deeper.
- A door creaks in the distance.
- Is that... dial-up modem sounds?
nouns:
  pipes: "Exposed pipes run along the ceiling, wrapped in ancient insulation. Some are labeled. Most are not."
  signs: "STAFF ONLY signs are plastered everywhere. Someone has added EXCEPT HACKERS in sharpie."
  door: "A heavy door to the east, covered in dust. The handle is warm to the touch."
