idlemessages:
- Someone raises a toast.
- Laughter from a corner booth.
- A group debates firewalls.
- Ice clinks in glasses.
- "...heard there's an old server room behind the con floor. Still running something from the 90s..."
- A lime rolls across the bar mysteriously.
- "Check the service door on the con floor. Trust me."
nouns:
  limes: A bowl of fresh limes sits on the counter, their bright green skin glistening. The house special requires one per drink. They seem to be everywhere at this con.
  bowl: :limes
  counter: A long wooden bar counter, worn smooth by years of elbows and spilled drinks. Stickers from previous cons are layered underneath the lacquer like digital archaeology.
  bar: :counter
  jukebox: An ancient jukebox in the corner plays a mix of synthwave and chiptunes. Someone has taped a "NO COUNTRY" sign to it.
