idlemessages:
- sq33k rushes past solving problems.
- The schedule board updates with a soft click.
- 'Someone shouts "I''m in!" Cheers follow.'
- A drone buzzes overhead, camera blinking.
- You smell soldering flux and energy drinks.
- '"The WiFi password is hunter2" someone jokes.'
- A badge chirps as it exchanges data with another.
- 'You notice a staff member slip through a door marked "SERVICE".'
- Someone whispers about an old server room hidden somewhere.
nouns:
  schedule: "The schedule board is a massive display showing talk times, village events, and CTF standings. Names scroll by too fast to read. Someone has drawn a lime in the corner."
  board: ":schedule"
  banners: "Massive lime green banners hang from the ceiling, emblazoned with the CackalackyCon logo. They flutter slightly in the aggressive air conditioning."
  booths: "Vendor booths line the edges, selling lockpicks, USB rubber duckies, soldering kits, and merch. One booth is just a guy with a cardboard sign that says FREE ADVICE."
  vendors: ":booths"
  door: "A plain door marked SERVICE - STAFF ONLY is barely visible behind a banner. It looks like it might lead somewhere interesting. Try searching the area."
  service: ":door"
