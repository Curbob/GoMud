title: Trivia Stage
description: A darkened stage where the disembodied voice of Vic Vandal echoes from
  hidden speakers, asking trivia about hacker movies and infosec history. No one
  has seen Vic in person. SAY your answer out loud when asked. Karaoke west.
mapsymbol: "?"
maplegend: Trivia
