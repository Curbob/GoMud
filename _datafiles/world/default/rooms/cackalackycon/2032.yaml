idlemessages:
- The stage lights flicker mysteriously.
- Speakers crackle with anticipation.
- Someone claims they once saw Vic's shadow. No one believes them.
- A correct answer echoes through the room.
- Teams huddle, whispering theories about who Vic really is.
- The darkness seems to be watching. Judging.
nouns:
  stage: A darkened platform with dramatic lighting. Speakers are mounted everywhere, but no host is visible. Just Vic's voice.
  speakers: Professional audio equipment. Vic's voice comes from all of them simultaneously, making him impossible to locate.
  vic: You look around for Vic Vandal, but there's no one there. Just the voice. Always the voice.
  vandal: :vic
  darkness: The stage is shrouded in deliberate darkness. Vic prefers it this way.
  lights: Dramatic spotlights that illuminate contestants but leave the host's area in complete shadow.
