roomid: 2029
zone: CackalackyCon
title: IoT Playground
description: Smart devices begging to be hacked. Cameras, locks, bulbs, thermostats.
  An Echo Dot glows on a shelf. A sign reads Default Passwords Hall of Shame.
  Deral Heiland looms over a workbench examining a smart lock. Cipher room north.
mapsymbol: I
maplegend: IoT
biome: indoor
exits:
  north:
    roomid: 2027
