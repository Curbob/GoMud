idlemessages:
- A smart bulb flickers in a sinister pattern.
- Someone dumps firmware from a camera.
- 'A smart lock clicks open. Whoops.'
- admin/admin strikes again.
- An IoT device phones home to a server in Eastern Europe.
- Something beeps. It should not be beeping.
- The Echo Dot's ring pulses blue.
- A baby monitor picks up signals from the space station.
nouns:
  sign: "Default Passwords Hall of Shame: admin/admin, root/root, password/password, 1234, 0000, admin/password. The list goes on for pages. It's both hilarious and terrifying."
  cameras: "IP cameras line a shelf, their red LEDs blinking. Most are already compromised. One is taped over for 'privacy'. The tape is see-through."
  devices: "A chaotic pile of smart devices - toasters, fish tank monitors, baby monitors, smart plugs. All networked. All vulnerable. One thermostat displays 666°F."
  thermostat: "A smart thermostat showing 666°F. It's not actually that hot. Probably. Someone has drawn a tiny devil face on it."
  lock: "A 'smart' lock sits in pieces on the workbench. Deral opened it with a magnet and a stern look."
  alexa: "An Amazon Echo Dot with a glowing blue ring. Always listening. Always judging your password choices."
  echo: :alexa
  dot: :alexa
  mustache: "You try to examine Deral's mustache. It examines you back. You feel inadequate."
  fridge: "A smart refrigerator in the corner displays 'HACKED' on its screen. Inside: energy drinks, leftover pizza, and a USB drive labeled 'DEFINITELY NOT MALWARE'."
