nouns:
  scoreboard: "A massive display showing team rankings, solve counts, and time remaining. Your team is... not on it."
  screens: "Multiple screens show different challenge categories - Web, Crypto, Pwn, Rev, Misc. The Misc category looks suspiciously empty."
  laptops: "Laptops cover every surface, screens filled with hex editors, terminal windows, and one person definitely just playing Tetris."
