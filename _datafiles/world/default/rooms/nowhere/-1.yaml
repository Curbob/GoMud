roomid: -1
zone: Nowhere
title: Hotel Parking Lot
description: >-
  You stand in a sprawling parking lot under a warm North Carolina sky. The air 
  carries the faint smell of asphalt and possibility. Ahead, a hotel rises 
  against the Durham skyline, its entrance adorned with a bright green banner 
  reading <ansi fg="green-bold">CACKALACKYCON 2026</ansi>. 
  
  People stream toward the doors — some carrying laptops, others hauling pelican 
  cases of mysterious equipment. A few wear last year's electronic badges like 
  medals of honor. You can hear excited chatter about CTF challenges, badge hacks, 
  and which talks not to miss.
  
  The main entrance beckons. Your adventure awaits inside.
  
  <ansi fg="yellow">(Type</ansi> <ansi fg="command">new</ansi> <ansi fg="yellow">to create a character, or</ansi> <ansi fg="command">login</ansi> <ansi fg="yellow">if returning.)</ansi>
exits:
  enter:
    roomid: -1
idlemessages:
- A rideshare pulls up and deposits another group of hackers.
- Someone walks past muttering about firmware.
- You hear laughter from a group comparing badge designs.
- Type <ansi fg="command">new</ansi> to create a character or <ansi fg="command">login</ansi> to continue.
- A drone buzzes overhead, filming something.
- Is that a lime rolling across the parking lot?
