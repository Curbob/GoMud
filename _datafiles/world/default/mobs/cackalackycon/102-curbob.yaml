character:
  name: Curbob
  description: >-
    A con legend. Curbob has been coming to CackalackyCon (and CarolinaCon before it) 
    for twenty years. His laptop is covered in stickers from cons that no longer exist. 
    He's seen it all — the golden age, the drama, the legendary hacks, the infamous 
    parties. Ask him about the old days and he'll talk your ear off. He knows where 
    all the bodies are buried. Metaphorically. Probably.
